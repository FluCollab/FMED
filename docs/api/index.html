<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMED API Explorer</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            line-height: 1.5;
        }

        .header {
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .url {
            color: #ce9178;
        }

        .keyword {
            color: #569cd6;
        }

        .string {
            color: #ce9178;
        }

        .number {
            color: #b5cea8;
        }

        .boolean {
            color: #569cd6;
        }

        .null {
            color: #569cd6;
        }

        .key {
            color: #9cdcfe;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loading {
            color: #6a9955;
            font-style: italic;
        }

        .error {
            color: #f44747;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>FMED API Explorer</div>
        <div class="url" id="apiUrl"></div>
    </div>
    <div id="status" class="loading">Processing request...</div>
    <pre id="output"></pre>

    <script>
        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const protein = params.get('protein');
            const effect = params.get('effect')?.replace(/_/g, ' ');
            const mutation = params.get('mutation');

            document.getElementById('apiUrl').textContent = window.location.href;

            try {
                let data = [];
                const status = document.getElementById('status');

                // Determine which file to fetch
                if (protein) {
                    status.textContent = `Fetching protein/${protein}.json...`;
                    const res = await fetch(`protein/${protein}.json`);
                    if (!res.ok) throw new Error(`Protein "${protein}" not found`);
                    data = await res.json();
                } else {
                    status.textContent = 'Fetching all.json...';
                    const res = await fetch('all.json');
                    data = await res.json();
                }

                // Apply filters
                if (effect) {
                    data = data.filter(m => m.effect.toLowerCase() === effect.toLowerCase());
                }
                if (mutation) {
                    data = data.filter(m => m.mutation.toUpperCase() === mutation.toUpperCase());
                }

                status.style.display = 'none';
                document.getElementById('output').innerHTML = syntaxHighlight(data);

            } catch (err) {
                document.getElementById('status').className = 'error';
                document.getElementById('status').textContent = `Error: ${err.message}`;
            }
        }

        init();
    </script>
</body>

</html>
